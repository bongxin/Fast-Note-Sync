<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>消毒登记记录 - 效果图</title>
  <style>
    :root {
      --primary: #00c19d;
      --primary-dark: #00a888;
      --bg: #f5f6f7;
      --text: #333;
      --text-secondary: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 100%;
      max-width: 414px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 24px rgba(0,0,0,.12);
    }

    .status-bar { height: 20px; background: var(--primary-dark); }
    .nav-bar {
      background: var(--primary);
      color: #fff;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back { font-size: 20px; width: 32px; cursor: pointer; user-select: none; }
    .nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; margin-right: 32px; }

    .filter-bar {
      background: var(--bg);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid #ebebeb;
    }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .filter-chip .arrow { font-size: 10px; color: #bbb; }
    .filter-chip .clear { color: #ccc; margin-left: 2px; font-size: 14px; }

    .list { flex: 1; padding: 10px 12px 20px; overflow-y: auto; }
    .record-card {
      display: flex;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      cursor: pointer;
    }
    .record-card:active { opacity: .92; }
    .date-block {
      width: 58px;
      flex-shrink: 0;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      padding: 8px 4px;
    }
    .card-body { flex: 1; padding: 12px 12px 12px 14px; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .card-line { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

    .load-tip { text-align: center; color: #bbb; font-size: 12px; padding: 16px 0; }

    .mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
    }
    .mask.show { display: block; }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: -100%;
      max-width: 414px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px 12px 0 0;
      z-index: 201;
      transition: bottom .3s ease;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .sheet.show { bottom: 0; }
    .sheet-header {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
    }
    .sheet-close { font-size: 22px; color: #999; cursor: pointer; border: none; background: none; line-height: 1; }
    .sheet-body { flex: 1; overflow-y: auto; padding: 12px 16px 24px; }
    .section-label {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin: 4px 0 8px;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }
    .detail-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { width: 100px; color: var(--text-secondary); flex-shrink: 0; }
    .detail-value { flex: 1; color: var(--text); word-break: break-all; }
    .sign-img {
      display: inline-block;
      min-width: 80px;
      height: 36px;
      border: 1px dashed #ddd;
      border-radius: 4px;
      font-family: KaiTi, STKaiti, serif;
      font-size: 20px;
      text-align: center;
      line-height: 34px;
      background: #fafafa;
    }
    .photo-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 4px;
      background: linear-gradient(135deg, #e8f8f5, #d0efe8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--primary);
      cursor: pointer;
    }
    .photo-thumb:active { opacity: .85; }

    .preview-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }
    .preview-mask.show { display: flex; }
    .preview-box {
      width: 280px;
      height: 280px;
      background: linear-gradient(135deg, #3a8f7a, #00c19d);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .preview-close {
      position: absolute;
      top: 40px;
      right: 20px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      border: none;
      background: none;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"></div>
    <header class="nav-bar">
      <span class="nav-back" onclick="history.back()">‹</span>
      <span class="nav-title">消毒登记记录</span>
    </header>

    <div class="filter-bar">
      <div class="filter-chip">
        <span>日期：2026-06-23 至 2026-06-29</span>
        <span class="clear">×</span>
      </div>
      <div class="filter-chip">
        <span>消毒药物：全部</span>
        <span class="arrow">▼</span>
      </div>
    </div>

    <div class="list" id="list"></div>
    <div class="load-tip">— 上拉加载更多 —</div>
  </div>

  <div class="mask" id="mask"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <span>登记详情</span>
      <button class="sheet-close" id="sheetClose">×</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <div class="preview-mask" id="previewMask">
    <button class="preview-close" id="previewClose">×</button>
    <div class="preview-box" id="previewBox">现场照片 1/3</div>
  </div>

  <script>
    var records = [
      {
        id: 201,
        cleanDate: '2026-06-29',
        cleanTime: '12:13:29',
        drug: '过硫酸氢钾复合物',
        ratio: '1:200',
        method: '喷洗',
        cleaner: '张三',
        submitTime: '2026-06-29 12:15',
        photos: 2
      },
      {
        id: 202,
        cleanDate: '2026-06-28',
        cleanTime: '08:30:00',
        drug: '戊二醛',
        ratio: '1:500',
        method: '喷洗',
        cleaner: '李四',
        submitTime: '2026-06-28 08:32',
        photos: 3
      },
      {
        id: 203,
        cleanDate: '2026-06-27',
        cleanTime: '16:45:10',
        drug: '过硫酸氢钾复合物',
        ratio: '1:200',
        method: '喷洗',
        cleaner: '王五',
        submitTime: '2026-06-27 16:48',
        photos: 1
      },
      {
        id: 204,
        cleanDate: '2026-06-26',
        cleanTime: '11:20:05',
        drug: '次氯酸钠',
        ratio: '1:100',
        method: '喷洗',
        cleaner: '张三',
        submitTime: '2026-06-26 11:22',
        photos: 2
      },
      {
        id: 205,
        cleanDate: '2026-06-25',
        cleanTime: '14:00:00',
        drug: '过硫酸氢钾复合物',
        ratio: '1:200',
        method: '喷洗',
        cleaner: '李四',
        submitTime: '2026-06-25 14:03',
        photos: 3
      }
    ];

    function shortDate(dateStr) {
      return dateStr.slice(5);
    }

    function photoGrid(count) {
      if (!count) return '—';
      var html = '<div class="photo-grid">';
      for (var i = 1; i <= count; i++) {
        html += '<div class="photo-thumb" data-idx="' + i + '" data-total="' + count + '">现场' + i + '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderList() {
      document.getElementById('list').innerHTML = records.map(function (r) {
        return '<div class="record-card" data-id="' + r.id + '">' +
          '<div class="date-block">' + shortDate(r.cleanDate) + '</div>' +
          '<div class="card-body">' +
            '<div class="card-title">日期：' + r.cleanDate + '</div>' +
            '<div class="card-line">清洗时间：' + r.cleanTime + '</div>' +
            '<div class="card-line">消毒药物：' + r.drug + '</div>' +
            '<div class="card-line">清洗人员：' + r.cleaner + '</div>' +
            '<div class="card-line">提交时间：' + r.submitTime + '</div>' +
          '</div></div>';
      }).join('');
    }

    function openDetail(id) {
      var r = records.find(function (x) { return x.id === id; });
      if (!r) return;
      document.getElementById('sheetBody').innerHTML =
        '<div class="section-label">登记信息</div>' +
        '<div class="detail-row"><span class="detail-label">清洗日期</span><span class="detail-value">' + r.cleanDate + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">清洗时间</span><span class="detail-value">' + r.cleanTime + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">消毒药物名称</span><span class="detail-value">' + r.drug + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">浓度比率</span><span class="detail-value">' + r.ratio + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">消毒方案</span><span class="detail-value">' + r.method + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">现场照片</span><span class="detail-value">' + photoGrid(r.photos) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">清洗人员签名</span><span class="detail-value"><span class="sign-img">' + r.cleaner + '</span></span></div>' +
        '<div class="detail-row"><span class="detail-label">清洗人员</span><span class="detail-value">' + r.cleaner + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">提交时间</span><span class="detail-value">' + r.submitTime + '</span></div>';
      document.getElementById('mask').classList.add('show');
      document.getElementById('sheet').classList.add('show');
    }

    function closeDetail() {
      document.getElementById('mask').classList.remove('show');
      document.getElementById('sheet').classList.remove('show');
    }

    renderList();

    document.getElementById('list').addEventListener('click', function (e) {
      var card = e.target.closest('.record-card');
      if (card) openDetail(parseInt(card.getAttribute('data-id'), 10));
    });
    document.getElementById('mask').onclick = closeDetail;
    document.getElementById('sheetClose').onclick = closeDetail;

    document.getElementById('sheetBody').addEventListener('click', function (e) {
      var thumb = e.target.closest('.photo-thumb');
      if (!thumb) return;
      document.getElementById('previewBox').textContent =
        '现场照片 ' + thumb.getAttribute('data-idx') + '/' + thumb.getAttribute('data-total');
      document.getElementById('previewMask').classList.add('show');
    });
    document.getElementById('previewClose').onclick = function () {
      document.getElementById('previewMask').classList.remove('show');
    };
    document.getElementById('previewMask').onclick = function (e) {
      if (e.target === this) this.classList.remove('show');
    };
  </script>
</body>
</html>
