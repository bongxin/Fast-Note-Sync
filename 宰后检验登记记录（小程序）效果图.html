<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宰后检验登记记录 - 效果图</title>
  <style>
    :root {
      --primary: #00b89c;
      --primary-dark: #009e86;
      --bg: #f5f6f7;
      --text: #333;
      --text-secondary: #888;
      --danger: #e54d42;
      --danger-bg: #fdecea;
      --success: #00b89c;
      --success-bg: #e6f9f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 100%;
      max-width: 414px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 24px rgba(0,0,0,.12);
    }

    /* 顶部导航 */
    .nav-bar {
      background: var(--primary);
      color: #fff;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back { font-size: 20px; width: 32px; cursor: pointer; user-select: none; }
    .nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; margin-right: 32px; }
    .status-bar {
      height: 20px;
      background: var(--primary-dark);
    }

    /* 筛选栏 */
    .filter-bar {
      background: var(--bg);
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid #ebebeb;
    }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .filter-chip .arrow { font-size: 10px; color: #bbb; }
    .filter-chip .clear { color: #ccc; margin-left: 2px; font-size: 14px; }

    /* 列表 */
    .list { flex: 1; padding: 10px 12px 20px; overflow-y: auto; }
    .record-card {
      display: flex;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      cursor: pointer;
      position: relative;
    }
    .record-card:active { opacity: .92; }
    .line-block {
      width: 58px;
      flex-shrink: 0;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      padding: 8px 4px;
    }
    .card-body { flex: 1; padding: 12px 12px 12px 14px; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .card-line { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .status-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .status-badge.pending { background: var(--danger-bg); color: var(--danger); }
    .status-badge.approved { background: var(--success-bg); color: var(--success); }

    /* 详情弹层 */
    .mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
    }
    .mask.show { display: block; }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: -100%;
      max-width: 414px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px 12px 0 0;
      z-index: 201;
      transition: bottom .3s ease;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .sheet.show { bottom: 0; }
    .sheet-header {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
    }
    .sheet-close { font-size: 22px; color: #999; cursor: pointer; border: none; background: none; line-height: 1; }
    .sheet-body { flex: 1; overflow-y: auto; padding: 12px 16px 24px; }
    .section-label {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin: 12px 0 8px;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }
    .detail-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { width: 90px; color: var(--text-secondary); flex-shrink: 0; }
    .detail-value { flex: 1; color: var(--text); word-break: break-all; }
    .sign-img {
      display: inline-block;
      min-width: 80px;
      height: 36px;
      border: 1px dashed #ddd;
      border-radius: 4px;
      font-family: KaiTi, STKaiti, serif;
      font-size: 20px;
      text-align: center;
      line-height: 34px;
      background: #fafafa;
    }

    .load-tip { text-align: center; color: #bbb; font-size: 12px; padding: 16px 0; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"></div>
    <header class="nav-bar">
      <span class="nav-back" onclick="history.back()">‹</span>
      <span class="nav-title">宰后检验登记记录</span>
    </header>

    <div class="filter-bar">
      <div class="filter-chip">
        <span>日期：2026-06-23 至 2026-06-29</span>
        <span class="clear">×</span>
      </div>
      <div class="filter-chip">
        <span>审核状态：全部</span>
        <span class="arrow">▼</span>
      </div>
      <div class="filter-chip">
        <span>生产线：全部</span>
        <span class="arrow">▼</span>
      </div>
    </div>

    <div class="list" id="list"></div>
    <div class="load-tip">— 上拉加载更多 —</div>
  </div>

  <div class="mask" id="mask"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <span>登记详情</span>
      <button class="sheet-close" id="sheetClose">×</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <script>
    var records = [
      { id: 101, date: '2026-06-29', line: '1号线', inspector: '王五', status: 'pending', submitTime: '2026-06-29 09:15', reviewTime: '', reviewer: '', reviewerSign: '' },
      { id: 102, date: '2026-06-29', line: '2号线', inspector: '李四', status: 'pending', submitTime: '2026-06-29 10:30', reviewTime: '', reviewer: '', reviewerSign: '' },
      { id: 103, date: '2026-06-28', line: '3号线', inspector: '王五', status: 'approved', submitTime: '2026-06-28 14:20', reviewTime: '2026-06-28 17:30', reviewer: '张三', reviewerSign: '张三' },
      { id: 104, date: '2026-06-27', line: '1号线', inspector: '李四', status: 'approved', submitTime: '2026-06-27 08:50', reviewTime: '2026-06-27 16:45', reviewer: '张三', reviewerSign: '张三' },
      { id: 105, date: '2026-06-26', line: '2号线', inspector: '王五', status: 'approved', submitTime: '2026-06-26 11:00', reviewTime: '2026-06-26 18:00', reviewer: '张三', reviewerSign: '张三' }
    ];

    function statusBadge(status) {
      if (status === 'pending') return '<span class="status-badge pending">待审核</span>';
      return '<span class="status-badge approved">已通过</span>';
    }

    function timeLine(r) {
      if (r.status === 'approved' && r.reviewTime) {
        return '复核时间：' + r.reviewTime;
      }
      return '提交时间：' + r.submitTime;
    }

    function renderList() {
      document.getElementById('list').innerHTML = records.map(function (r) {
        return '<div class="record-card" data-id="' + r.id + '">' +
          '<div class="line-block">' + r.line + '</div>' +
          '<div class="card-body">' +
            statusBadge(r.status) +
            '<div class="card-title">日期：' + r.date + '</div>' +
            '<div class="card-line">检验员：' + r.inspector + '</div>' +
            '<div class="card-line">' + timeLine(r) + '</div>' +
          '</div></div>';
      }).join('');
    }

    function openDetail(id) {
      var r = records.find(function (x) { return x.id === id; });
      if (!r) return;
      var reviewHtml = '';
      if (r.status === 'approved') {
        reviewHtml =
          '<div class="section-label">复核信息</div>' +
          '<div class="detail-row"><span class="detail-label">审核状态</span><span class="detail-value">已通过</span></div>' +
          '<div class="detail-row"><span class="detail-label">复核人</span><span class="detail-value">' + r.reviewer + '</span></div>' +
          '<div class="detail-row"><span class="detail-label">复核人签名</span><span class="detail-value"><span class="sign-img">' + r.reviewerSign + '</span></span></div>' +
          '<div class="detail-row"><span class="detail-label">复核时间</span><span class="detail-value">' + r.reviewTime + '</span></div>';
      } else {
        reviewHtml =
          '<div class="section-label">复核信息</div>' +
          '<div class="detail-row"><span class="detail-label">审核状态</span><span class="detail-value" style="color:#e54d42">待审核</span></div>';
      }
      document.getElementById('sheetBody').innerHTML =
        '<div class="section-label">登记信息</div>' +
        '<div class="detail-row"><span class="detail-label">日期</span><span class="detail-value">' + r.date + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">生产线</span><span class="detail-value">' + r.line + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">检验员签名</span><span class="detail-value"><span class="sign-img">' + r.inspector + '</span></span></div>' +
        '<div class="detail-row"><span class="detail-label">检验员</span><span class="detail-value">' + r.inspector + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">提交时间</span><span class="detail-value">' + r.submitTime + '</span></div>' +
        reviewHtml;
      document.getElementById('mask').classList.add('show');
      document.getElementById('sheet').classList.add('show');
    }

    function closeDetail() {
      document.getElementById('mask').classList.remove('show');
      document.getElementById('sheet').classList.remove('show');
    }

    renderList();

    document.getElementById('list').addEventListener('click', function (e) {
      var card = e.target.closest('.record-card');
      if (card) openDetail(parseInt(card.getAttribute('data-id'), 10));
    });
    document.getElementById('mask').onclick = closeDetail;
    document.getElementById('sheetClose').onclick = closeDetail;
  </script>
</body>
</html>
