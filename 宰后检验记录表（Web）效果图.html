<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宰后检验登记审核 - 效果图</title>
  <style>
    :root {
      --el-color-primary: #409eff;
      --el-color-success: #67c23a;
      --el-color-warning: #e6a23c;
      --el-color-danger: #f56c6c;
      --el-border: #ebeef5;
      --el-text: #303133;
      --el-text-secondary: #606266;
      --el-text-placeholder: #a8abb2;
      --el-bg: #f0f2f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; color: var(--el-text); }
    .layout { display: flex; height: 100%; background: var(--el-bg); }

    .sidebar { width: 210px; background: #001529; color: #bfcbd9; flex-shrink: 0; display: flex; flex-direction: column; transition: width .28s; }
    .sidebar.collapsed { width: 64px; }
    .logo { height: 50px; display: flex; align-items: center; justify-content: center; background: #002140; color: #fff; font-size: 15px; font-weight: 600; overflow: hidden; white-space: nowrap; }
    .logo span { margin-left: 8px; }
    .sidebar.collapsed .logo span, .sidebar.collapsed .menu-group-title, .sidebar.collapsed .menu-item .label { display: none; }
    .menu-group-title { padding: 12px 20px 6px; font-size: 12px; color: #6b7a8d; }
    .menu-item { display: flex; align-items: center; padding: 0 20px; height: 48px; cursor: pointer; font-size: 14px; }
    .menu-item:hover { color: #fff; background: rgba(255,255,255,.08); }
    .menu-item.active { color: #fff; background: var(--el-color-primary); }
    .menu-item .icon { width: 20px; margin-right: 10px; text-align: center; }
    .sidebar.collapsed .menu-item { justify-content: center; padding: 0; }
    .sidebar.collapsed .menu-item .icon { margin-right: 0; }

    .main-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .navbar { height: 50px; background: #fff; border-bottom: 1px solid #e6e6e6; display: flex; align-items: center; padding: 0 16px; box-shadow: 0 1px 4px rgba(0,21,41,.08); }
    .hamburger { font-size: 18px; cursor: pointer; margin-right: 16px; color: #5a5e66; user-select: none; }
    .breadcrumb { flex: 1; color: #97a8be; }
    .breadcrumb b { color: var(--el-text); font-weight: 500; }
    .navbar-right { display: flex; align-items: center; gap: 12px; color: #5a5e66; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #409eff, #66b1ff); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; }

    .app-main { flex: 1; padding: 16px; overflow: auto; }
    .card { background: #fff; border-radius: 4px; padding: 18px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,21,41,.04); }
    .search-form { display: flex; flex-wrap: wrap; gap: 12px 24px; align-items: center; }
    .form-item { display: flex; align-items: center; gap: 8px; }
    .form-item label { color: var(--el-text-secondary); white-space: nowrap; }
    .input, .select, .textarea {
      border: 1px solid #dcdfe6; border-radius: 4px; padding: 0 12px; height: 32px; font-size: 14px; color: var(--el-text); outline: none;
    }
    .input:focus, .select:focus, .textarea:focus { border-color: var(--el-color-primary); }
    .input { width: 130px; }
    .select { min-width: 120px; background: #fff; }
    .textarea { height: auto; padding: 6px 10px; width: 100%; resize: vertical; min-height: 52px; line-height: 1.5; }

    .btn { display: inline-flex; align-items: center; justify-content: center; height: 32px; padding: 0 16px; border-radius: 4px; border: 1px solid #dcdfe6; background: #fff; color: var(--el-text); cursor: pointer; font-size: 14px; white-space: nowrap; }
    .btn:hover { color: var(--el-color-primary); border-color: #c6e2ff; background: #ecf5ff; }
    .btn-primary { background: var(--el-color-primary); border-color: var(--el-color-primary); color: #fff; }
    .btn-primary:hover { background: #66b1ff; border-color: #66b1ff; color: #fff; }
    .btn-success { background: var(--el-color-success); border-color: var(--el-color-success); color: #fff; }
    .btn-success:hover { background: #85ce61; border-color: #85ce61; color: #fff; }
    .btn-link { border: none; background: none; color: var(--el-color-primary); padding: 0 4px; height: auto; }
    .btn-link:hover { background: none; color: #66b1ff; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .table-title { font-size: 16px; font-weight: 600; }
    .tag { display: inline-block; padding: 0 9px; height: 24px; line-height: 22px; border-radius: 4px; font-size: 12px; border: 1px solid; }
    .tag-info { background: #f4f4f5; border-color: #e9e9eb; color: #909399; }
    .tag-warning { background: #fdf6ec; border-color: #faecd8; color: var(--el-color-warning); }
    .tag-success { background: #f0f9eb; border-color: #e1f3d8; color: var(--el-color-success); }
    .tag-danger { background: #fef0f0; border-color: #fde2e2; color: var(--el-color-danger); }

    .table-wrap { overflow-x: auto; border: 1px solid var(--el-border); border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th, td { border-bottom: 1px solid var(--el-border); border-right: 1px solid var(--el-border); padding: 10px 12px; text-align: left; font-size: 13px; vertical-align: middle; }
    th { background: #f5f7fa; color: var(--el-text-secondary); font-weight: 600; white-space: nowrap; }
    th:last-child, td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f5f7fa; }
    tbody tr.striped { background: #fafafa; }
    tbody tr.striped:hover { background: #f5f7fa; }
    .text-center { text-align: center; }
    .expand-btn { cursor: pointer; color: var(--el-text-secondary); user-select: none; width: 24px; display: inline-block; text-align: center; transition: transform .2s; }
    .expand-btn.open { transform: rotate(90deg); color: var(--el-color-primary); }
    .expand-row td { padding: 0; background: #fafafa; }
    .expand-inner { padding: 12px 16px 12px 48px; }
    .expand-title { font-size: 13px; color: #909399; margin-bottom: 8px; font-weight: 500; }
    .sub-table { min-width: 800px; }
    .sub-table th { background: #eef1f6; }

    .sign-box { display: inline-block; min-width: 72px; height: 32px; border: 1px dashed #dcdfe6; border-radius: 4px; background: #fff; font-family: KaiTi, STKaiti, serif; font-size: 18px; text-align: center; line-height: 30px; padding: 0 8px; }

    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 16px; font-size: 13px; color: var(--el-text-secondary); }
    .page-btn { min-width: 32px; height: 32px; border: none; background: #f4f4f5; border-radius: 4px; cursor: pointer; }
    .page-btn.active { background: var(--el-color-primary); color: #fff; }

    /* 抽屉 */
    .mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; }
    .mask.show { display: block; }
    .drawer { position: fixed; top: 0; right: -500px; width: 480px; max-width: 100%; height: 100%; background: #fff; z-index: 1001; box-shadow: -2px 0 8px rgba(0,0,0,.12); transition: right .3s; display: flex; flex-direction: column; }
    .drawer.show { right: 0; }
    .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border); display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 600; }
    .drawer-close { cursor: pointer; font-size: 20px; color: #909399; border: none; background: none; }
    .drawer-body { flex: 1; overflow: auto; padding: 16px 20px; }
    .drawer-footer { padding: 12px 20px; border-top: 1px solid var(--el-border); text-align: right; display: flex; gap: 8px; justify-content: flex-end; }
    .section-title { font-size: 14px; font-weight: 600; margin: 8px 0 12px; padding-left: 8px; border-left: 3px solid var(--el-color-primary); }
    .desc-table { width: 100%; border: 1px solid var(--el-border); border-collapse: collapse; margin-bottom: 16px; }
    .desc-table th, .desc-table td { border: 1px solid var(--el-border); padding: 10px 12px; font-size: 13px; }
    .desc-table th { width: 110px; background: #f5f7fa; color: var(--el-text-secondary); font-weight: 500; }
    .notes-box { background: #f5f7fa; border-radius: 4px; padding: 12px 16px; font-size: 13px; color: var(--el-text-secondary); line-height: 1.8; }

    /* 弹窗 */
    .dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; max-width: calc(100% - 32px); background: #fff; border-radius: 4px; z-index: 1002; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
    .dialog.show { display: block; }
    .dialog-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border); font-weight: 600; }
    .dialog-body { padding: 20px; }
    .dialog-footer { padding: 12px 20px; border-top: 1px solid var(--el-border); text-align: right; display: flex; gap: 8px; justify-content: flex-end; }
    .alert-info { background: #f4f4f5; border-radius: 4px; padding: 10px 12px; font-size: 13px; color: var(--el-text-secondary); margin-top: 12px; line-height: 1.6; }
    .toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #f0f9eb; border: 1px solid #e1f3d8; color: var(--el-color-success); padding: 10px 20px; border-radius: 4px; z-index: 2000; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="logo">🐷<span>粤海屠宰监管</span></div>
      <nav class="menu">
        <div class="menu-group-title">屠宰监管</div>
        <div class="menu-item"><span class="icon">📋</span><span class="label">巡仓登记审核</span></div>
        <div class="menu-item"><span class="icon">📦</span><span class="label">留仓记录</span></div>
        <div class="menu-item active"><span class="icon">🔬</span><span class="label">宰后检验登记审核</span></div>
      </nav>
    </aside>

    <div class="main-wrap">
      <header class="navbar">
        <span class="hamburger" id="toggleSidebar">☰</span>
        <div class="breadcrumb">屠宰监管 / <b>宰后检验登记审核</b></div>
        <div class="navbar-right"><span>品控部 · 张三</span><div class="avatar">张</div></div>
      </header>

      <main class="app-main">
        <div class="card">
          <div class="search-form">
            <div class="form-item">
              <label>日期范围</label>
              <input class="input" type="date" value="2026-06-20" />
              <span style="color:#909399">至</span>
              <input class="input" type="date" value="2026-06-26" />
            </div>
            <div class="form-item">
              <label>审核状态</label>
              <select class="select">
                <option>全部</option>
                <option>待审核</option>
                <option>已通过</option>
              </select>
            </div>
            <div class="btn-group">
              <button class="btn btn-primary">查询</button>
              <button class="btn">重置</button>
              <button class="btn btn-success" id="btnExport">导出</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="table-header">
            <span class="table-title">宰后检验登记审核</span>
            <span class="tag tag-info">近 7 天</span>
          </div>
          <div class="table-wrap">
            <table id="mainTable">
              <thead>
                <tr>
                  <th style="width:40px"></th>
                  <th>屠宰时间</th>
                  <th class="text-center">病害畜处理数量</th>
                  <th class="text-center">病害畜产品处理数量（公斤）</th>
                  <th>无害化处理原因及方式</th>
                  <th class="text-center">总屠宰数</th>
                  <th class="text-center">合格数量</th>
                  <th class="text-center">审核状态</th>
                  <th class="text-center">复核人</th>
                  <th class="text-center">复核时间</th>
                  <th class="text-center" style="width:110px">操作</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <span>共 3 条</span>
            <button class="page-btn">‹</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">›</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="mask" id="mask"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span id="drawerTitle">复核审核</span>
      <button class="drawer-close" id="drawerClose">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </div>

  <div class="dialog" id="exportDialog">
    <div class="dialog-header">导出宰后检验记录表</div>
    <div class="dialog-body">
      <div class="form-item" style="margin-bottom:12px">
        <label style="width:80px">屠宰日期</label>
        <input class="input" type="date" value="2026-06-26" style="flex:1;width:100%" />
      </div>
      <div class="alert-info">将按《宰后检验记录表》纸质模板格式导出 Excel（YH/QR-206）</div>
    </div>
    <div class="dialog-footer">
      <button class="btn" id="exportCancel">取消</button>
      <button class="btn btn-primary" id="exportConfirm">确认导出</button>
    </div>
  </div>

  <div class="toast" id="toast">审核成功</div>

  <script>
    var editingRowId = null;

    const data = [
      {
        id: 1, slaughterDate: '2026-06-26', diseasedAnimalQty: 2, diseasedProductKg: 45.5,
        treatmentReason: '干化', totalSlaughter: 1260, qualifiedQty: 1258,
        status: 'pending', reviewer: '', reviewTime: '',
        lines: [
          { lineName: '1号线', slaughterQty: 420, inspection: '不合格', inspectorSign: '王五', registerTime: '2026-06-26 09:15' },
          { lineName: '2号线', slaughterQty: 438, inspection: '不合格', inspectorSign: '李四', registerTime: '2026-06-26 10:30' },
          { lineName: '3号线', slaughterQty: 402, inspection: '不合格', inspectorSign: '王五', registerTime: '2026-06-26 14:20' }
        ]
      },
      {
        id: 2, slaughterDate: '2026-06-25', diseasedAnimalQty: 0, diseasedProductKg: 0,
        treatmentReason: '干化', totalSlaughter: 1185, qualifiedQty: 1185,
        status: 'approved', reviewer: '张三', reviewTime: '2026-06-25 17:30',
        lines: [
          { lineName: '1号线', slaughterQty: 395, inspection: '合格', inspectorSign: '李四', registerTime: '2026-06-25 08:50' },
          { lineName: '2号线', slaughterQty: 400, inspection: '合格', inspectorSign: '李四', registerTime: '2026-06-25 11:00' },
          { lineName: '3号线', slaughterQty: 390, inspection: '合格', inspectorSign: '王五', registerTime: '2026-06-25 15:40' }
        ]
      },
      {
        id: 3, slaughterDate: '2026-06-24', diseasedAnimalQty: 1, diseasedProductKg: 28,
        treatmentReason: '干化', totalSlaughter: 1200, qualifiedQty: 1199,
        status: 'approved', reviewer: '张三', reviewTime: '2026-06-24 16:45',
        lines: [
          { lineName: '1号线', slaughterQty: 410, inspection: '不合格', inspectorSign: '王五', registerTime: '2026-06-24 09:00' },
          { lineName: '2号线', slaughterQty: 395, inspection: '不合格', inspectorSign: '李四', registerTime: '2026-06-24 10:15' },
          { lineName: '3号线', slaughterQty: 395, inspection: '不合格', inspectorSign: '王五', registerTime: '2026-06-24 13:50' }
        ]
      }
    ];

    function tagHtml(text, type) {
      return '<span class="tag tag-' + type + '">' + text + '</span>';
    }

    function renderSubTable(lines, date, editing) {
      let rows = lines.map(function (l) {
        var inspTag = l.inspection === '合格' ? tagHtml('合格', 'success') : tagHtml('不合格', 'danger');
        var sign = l.inspectorSign ? '<span class="sign-box">' + l.inspectorSign + '</span>' : '<span style="color:#c0c4cc">—</span>';
        var qtyCell = editing
          ? '<input class="input" type="number" value="' + l.slaughterQty + '" style="width:80px;text-align:center" />'
          : l.slaughterQty;
        return '<tr><td>' + l.lineName + '</td><td class="text-center">' + qtyCell + '</td><td class="text-center">' + inspTag + '</td><td class="text-center">' + sign + '</td><td>' + l.registerTime + '</td></tr>';
      }).join('');
      return '<div class="expand-inner"><div class="expand-title">生产线明细 — ' + date + '</div><div class="table-wrap"><table class="sub-table"><thead><tr><th>生产线</th><th class="text-center">各生产线屠宰数量</th><th class="text-center">胴体、内脏检验</th><th class="text-center">检验员</th><th>登记时间</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
    }

    function renderTable() {
      var tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map(function (row, idx) {
        var striped = idx % 2 === 1 ? ' striped' : '';
        var statusTag = row.status === 'pending' ? tagHtml('待审核', 'warning') : tagHtml('已通过', 'success');
        var pending = row.status === 'pending';
        var editing = pending && editingRowId === row.id;
        var diseasedCell = editing
          ? '<input class="input" type="number" value="' + row.diseasedAnimalQty + '" style="width:72px;text-align:center" />'
          : row.diseasedAnimalQty;
        var productCell = editing
          ? '<input class="input" type="number" value="' + row.diseasedProductKg + '" style="width:72px;text-align:center" step="0.1" />'
          : row.diseasedProductKg;
        var reasonCell = editing
          ? '<input class="input" type="text" value="' + (row.treatmentReason || '干化') + '" style="width:100%" />'
          : (row.treatmentReason || '干化');
        var actionBtn;
        if (pending) {
          if (editing) {
            actionBtn = '<button class="btn btn-link" data-action="save" data-id="' + row.id + '">保存</button>' +
              '<button class="btn btn-link" data-action="cancel-edit" data-id="' + row.id + '">取消</button>' +
              '<button class="btn btn-link" data-action="audit" data-id="' + row.id + '">审核</button>';
          } else {
            actionBtn = '<button class="btn btn-link" data-action="edit" data-id="' + row.id + '">编辑</button>' +
              '<button class="btn btn-link" data-action="audit" data-id="' + row.id + '">审核</button>';
          }
        } else {
          actionBtn = '<button class="btn btn-link" data-action="view" data-id="' + row.id + '">查看</button>';
        }
        var mainRow = '<tr class="' + striped.trim() + (editing ? ' editing-row' : '') + '" data-id="' + row.id + '">' +
          '<td class="text-center"><span class="expand-btn" data-expand="' + row.id + '">▶</span></td>' +
          '<td>' + row.slaughterDate + '</td>' +
          '<td class="text-center">' + diseasedCell + '</td>' +
          '<td class="text-center">' + productCell + '</td>' +
          '<td>' + reasonCell + '</td>' +
          '<td class="text-center">' + row.totalSlaughter + '</td>' +
          '<td class="text-center">' + row.qualifiedQty + '</td>' +
          '<td class="text-center">' + statusTag + '</td>' +
          '<td class="text-center">' + (row.reviewer || '—') + '</td>' +
          '<td class="text-center">' + (row.reviewTime || '—') + '</td>' +
          '<td class="text-center">' + actionBtn + '</td></tr>';
        var expandRow = '<tr class="expand-row" id="expand-' + row.id + '" style="display:' + (editing ? 'table-row' : 'none') + '"><td colspan="11">' + renderSubTable(row.lines, row.slaughterDate, editing) + '</td></tr>';
        return mainRow + expandRow;
      }).join('');
    }

    function openDrawer(row, mode) {
      document.getElementById('drawerTitle').textContent = mode === 'audit' ? '复核审核' : '查看复核信息';
      var statusTag = row.status === 'pending' ? tagHtml('待审核', 'warning') : tagHtml('已通过', 'success');
      document.getElementById('drawerBody').innerHTML =
        '<div class="section-title">审核信息</div>' +
        '<table class="desc-table"><tr><th>屠宰时间</th><td>' + row.slaughterDate + '</td></tr>' +
        '<tr><th>审核状态</th><td>' + statusTag + '</td></tr>' +
        '<tr><th>复核人</th><td>' + (row.status === 'pending' ? '张三（当前用户）' : row.reviewer) + '</td></tr>' +
        '<tr><th>复核人签名</th><td><span class="sign-box">张三</span></td></tr>' +
        (row.reviewTime ? '<tr><th>复核时间</th><td>' + row.reviewTime + '</td></tr>' : '') +
        '</table>' +
        '<div class="section-title">填表说明</div>' +
        '<div class="notes-box"><p>1. 根据当日屠宰批次顺序登记。</p><p>2. 病害畜处理数量为经确认无害化处理的病害猪数量（头）；病害畜产品处理数量为经确认不可食用而无害化处理的动物产品数量（公斤）。</p><p>3. “不合格”指胴体、内脏等存在可见病灶、病变淋巴结、寄生虫、气味异常等情形，须按规定无害化处理。</p><p>4. 企业应按月（季、年）汇总备查，保存期限不得少于 2 年。</p></div>';
      document.getElementById('drawerFooter').innerHTML = mode === 'audit'
        ? '<button class="btn" id="drawerCancel">取消</button><button class="btn btn-primary" id="drawerApprove" data-id="' + row.id + '">通过</button>'
        : '';
      document.getElementById('mask').classList.add('show');
      document.getElementById('drawer').classList.add('show');
    }

    function closeDrawer() {
      document.getElementById('mask').classList.remove('show');
      document.getElementById('drawer').classList.remove('show');
    }

    renderTable();

    document.getElementById('toggleSidebar').onclick = function () {
      document.getElementById('sidebar').classList.toggle('collapsed');
    };

    document.getElementById('tableBody').addEventListener('click', function (e) {
      var expandBtn = e.target.closest('[data-expand]');
      if (expandBtn) {
        var id = expandBtn.getAttribute('data-expand');
        var row = document.getElementById('expand-' + id);
        var open = row.style.display !== 'none';
        row.style.display = open ? 'none' : 'table-row';
        expandBtn.classList.toggle('open', !open);
        return;
      }
      var btn = e.target.closest('[data-action]');
      if (btn) {
        var id = parseInt(btn.getAttribute('data-id'), 10);
        var row = data.find(function (r) { return r.id === id; });
        var action = btn.getAttribute('data-action');
        if (action === 'edit') {
          editingRowId = id;
          renderTable();
          return;
        }
        if (action === 'cancel-edit') {
          editingRowId = null;
          renderTable();
          return;
        }
        if (action === 'save') {
          editingRowId = null;
          renderTable();
          var toast = document.getElementById('toast');
          toast.textContent = '保存成功';
          toast.classList.add('show');
          setTimeout(function () { toast.classList.remove('show'); toast.textContent = '审核成功'; }, 2000);
          return;
        }
        openDrawer(row, action);
      }
    });

    document.getElementById('drawerClose').onclick = closeDrawer;
    document.getElementById('mask').onclick = function () {
      closeDrawer();
      document.getElementById('exportDialog').classList.remove('show');
    };

    document.body.addEventListener('click', function (e) {
      if (e.target.id === 'drawerCancel') closeDrawer();
      if (e.target.id === 'drawerApprove') {
        var id = parseInt(e.target.getAttribute('data-id'), 10);
        var row = data.find(function (r) { return r.id === id; });
        row.status = 'approved';
        row.reviewer = '张三';
        row.reviewTime = '2026-06-26 18:00';
        editingRowId = null;
        renderTable();
        closeDrawer();
        var toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 2000);
      }
    });

    document.getElementById('btnExport').onclick = function () {
      document.getElementById('mask').classList.add('show');
      document.getElementById('exportDialog').classList.add('show');
    };
    document.getElementById('exportCancel').onclick = function () {
      document.getElementById('mask').classList.remove('show');
      document.getElementById('exportDialog').classList.remove('show');
    };
    document.getElementById('exportConfirm').onclick = function () {
      document.getElementById('mask').classList.remove('show');
      document.getElementById('exportDialog').classList.remove('show');
      alert('已触发导出（效果图演示）');
    };
  </script>
</body>
</html>
